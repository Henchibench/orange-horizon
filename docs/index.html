<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vad i helvete händer?!</title>
    <meta name="description" content="En svensk morgonbrief om globalt maktspel och haverier: Trump/USA, Putin/Ukraina, Iran och Orbán/EU." />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body data-state="loading">
    <div class="glow glow-a"></div>
    <div class="glow glow-b"></div>
    <main class="shell">
      <section class="hero panel panel-hero">
        <div class="hero-copy">
          <p class="eyebrow">Vad i helvete händer?!</p>
          <h1>Mäktiga idioter. Samlad skada.</h1>
          <p class="lede">Fyra bevakningar, en ordentlig öppningsbrief och därefter rena källhänvisningar till originalen. Mindre lull-lull, mer faktiskt läge.</p>
          <div class="hero-meta">
            <span id="last-updated" class="meta-pill">Laddar lägesbild…</span>
            <span id="story-count" class="meta-pill">—</span>
            <span id="source-count" class="meta-pill">—</span>
          </div>
          <p id="site-note" class="site-note"></p>
        </div>

        <section class="brief-panel">
          <div class="brief-heading">
            <p class="section-kicker">Öppningsbrief</p>
            <h2 id="brief-title">Morgonbrief</h2>
            <p id="brief-intro" class="brief-intro"></p>
          </div>
          <ul id="brief-bullets" class="brief-bullets"></ul>
        </section>
      </section>

      <section class="sections-intro">
        <div>
          <p class="section-kicker">Sektioner</p>
          <h2>Fyra spår genom dagens dumheter</h2>
        </div>
        <div id="sources-list" class="source-pills"></div>
      </section>

      <section class="sections">
        <div id="sections-list" class="sections-list" aria-live="polite"></div>
      </section>
    </main>

    <template id="section-template">
      <article class="panel section-card">
        <div class="section-top">
          <div>
            <p class="section-kicker"></p>
            <h2></h2>
          </div>
          <a class="section-feed" target="_blank" rel="noreferrer">RSS</a>
        </div>
        <p class="section-description"></p>
        <div class="section-summary-block">
          <p class="summary-label">Läget i korthet</p>
          <p class="section-summary"></p>
        </div>
        <details class="stories-wrap">
          <summary class="stories-toggle"></summary>
          <div class="stories"></div>
        </details>
      </article>
    </template>

    <template id="story-template">
      <article class="story">
        <div class="story-meta">
          <p class="source"></p>
          <time></time>
        </div>
        <h3></h3>
        <div class="story-links">
          <a class="read-more" target="_blank" rel="noreferrer">Läs originalet</a>
        </div>
      </article>
    </template>

    <template id="unavailable-template">
      <article class="panel unavailable-card">
        <p class="section-kicker">Tillfälligt otillgänglig</p>
        <h2>Ingen publicerad version just nu</h2>
        <p class="description">Sidan visar nästa uppdatering först när öppningsbriefen och sektionssammanfattningarna klarar språkkontrollen utan trasig svenska eller engelska rester.</p>
      </article>
    </template>

    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
